name: Security Audit

on:
  schedule:
    - cron: '0 0 * * 1' # Weekly on Monday
  push:
    branches: [main]
    paths: ['**/Cargo.toml', '**/Cargo.lock', '.github/workflows/audit.yml']
  pull_request:
    branches: [main]
    paths: ['**/Cargo.toml', '**/Cargo.lock', '.github/workflows/audit.yml']

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: |
          set -o pipefail
          url="https://github.com/rustsec/rustsec/releases/download/cargo-audit/v0.22.1/cargo-audit-x86_64-unknown-linux-gnu-v0.22.1.tgz"
          expected_sha="1890badd5f15831a9af4b074399fcd21e6f7c0fe42c84e9254cdffc9f813765c"
          archive="$(mktemp)"
          curl --fail --show-error --silent --location -o "$archive" "$url"
          echo "$expected_sha  $archive" | sha256sum -c -
          tar xz --strip-components=1 -C /usr/local/bin -f "$archive"
      - name: Run audit
        run: cargo audit
