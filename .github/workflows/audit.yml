name: Security Audit

on:
  schedule:
    - cron: '0 0 * * 1' # Weekly on Monday
  push:
    branches: [main]
    paths: ['**/Cargo.toml', '**/Cargo.lock', '.github/workflows/audit.yml']
  pull_request:
    branches: [main]
    paths: ['**/Cargo.toml', '**/Cargo.lock', '.github/workflows/audit.yml']

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: |
          curl -sSL https://github.com/rustsec/rustsec/releases/download/cargo-audit/v0.22.1/cargo-audit-x86_64-unknown-linux-gnu-v0.22.1.tgz | tar xz --strip-components=1 -C /usr/local/bin
      - name: Run audit
        run: cargo audit
